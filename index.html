<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Piece TCG Preistracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161b27;
      --surface2: #1e2535;
      --border: #2a3347;
      --accent: #e8b84b;
      --accent2: #4b8be8;
      --red: #e84b4b;
      --green: #4be87a;
      --text: #dde3f0;
      --muted: #7a8aaa;
      --radius: 12px;
      --sidebar: 230px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a0808 0%, #0d0f14 70%);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 14px;
      flex-shrink: 0;
    }
    .logo { width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent), #b8860b); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header p { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #lastUpdate { font-size: 0.72rem; color: var(--muted); }
    .refresh-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: all .15s;
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    aside {
      width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    .sidebar-header { padding: 12px 14px; font-size: 0.68rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); border-bottom: 1px solid var(--border); }
    .set-list { overflow-y: auto; flex: 1; padding: 6px 0; }
    .set-list::-webkit-scrollbar { width: 4px; }
    .set-list::-webkit-scrollbar-track { background: transparent; }
    .set-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .set-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; cursor: pointer; transition: background .1s;
      border-left: 3px solid transparent;
    }
    .set-item:hover { background: var(--surface2); }
    .set-item.active { background: rgba(232,184,75,.08); border-left-color: var(--accent); }
    .set-item.unavailable { opacity: .4; cursor: default; }
    .set-badge {
      font-size: 0.62rem; font-weight: 700; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px; color: var(--muted); flex-shrink: 0; font-family: monospace;
    }
    .set-item.active .set-badge { border-color: var(--accent); color: var(--accent); }
    .set-name { font-size: 0.78rem; line-height: 1.3; }
    .set-price { font-size: 0.72rem; color: var(--accent); font-weight: 600; margin-left: auto; flex-shrink: 0; }

    /* ── Sidebar bottom ── */
    .sidebar-footer { padding: 10px 14px; border-top: 1px solid var(--border); }
    .compare-btn {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); padding: 7px; border-radius: 6px; font-size: 0.75rem;
      cursor: pointer; transition: all .15s;
    }
    .compare-btn:hover, .compare-btn.active { background: rgba(75,139,232,.15); border-color: var(--accent2); color: var(--accent2); }

    /* ── Main content ── */
    main { flex: 1; overflow-y: auto; padding: 20px 24px; }
    main::-webkit-scrollbar { width: 4px; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Stats ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card.c-current::before { background: var(--accent); }
    .stat-card.c-min::before { background: var(--green); }
    .stat-card.c-max::before { background: var(--red); }
    .stat-card.c-avg::before { background: var(--accent2); }
    .stat-card.c-chg::before { background: #b44be8; }
    .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .stat-value { font-size: 1.6rem; font-weight: 700; }
    .stat-card.c-current .stat-value { color: var(--accent); }
    .stat-card.c-min .stat-value { color: var(--green); }
    .stat-card.c-max .stat-value { color: var(--red); }
    .stat-card.c-avg .stat-value { color: var(--accent2); }
    .stat-sub { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
    .badge { display: inline-flex; align-items: center; gap: 3px; font-size: 0.78rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 6px; }
    .badge.up { background: rgba(75,232,122,.12); color: var(--green); }
    .badge.down { background: rgba(232,75,75,.12); color: var(--red); }

    /* ── Chart ── */
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .chart-title { font-size: .95rem; font-weight: 600; }
    .range-btns { display: flex; gap: 5px; }
    .range-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 5px; font-size: .73rem; cursor: pointer; transition: all .15s; }
    .range-btn:hover, .range-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .chart-wrap { position: relative; height: 280px; }

    /* ── Compare view ── */
    .compare-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .compare-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; cursor: pointer; transition: all .15s;
    }
    .compare-card:hover { border-color: var(--accent); background: var(--surface2); }
    .compare-card .op-id { font-size: 0.65rem; color: var(--muted); font-family: monospace; margin-bottom: 6px; }
    .compare-card .op-name { font-size: 0.82rem; font-weight: 600; margin-bottom: 12px; line-height: 1.3; }
    .compare-card .op-price { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .compare-card .op-change { font-size: 0.72rem; margin-top: 4px; }
    .compare-card.unavailable { opacity: .4; cursor: default; }
    .compare-mini-chart { height: 50px; margin-top: 10px; }

    /* ── Table ── */
    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
    .table-head-row { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: .9rem; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    thead th { padding: 8px 18px; text-align: left; color: var(--muted); font-size: .65rem; text-transform: uppercase; letter-spacing: .07em; background: var(--surface2); font-weight: 500; }
    tbody tr { border-top: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 9px 18px; }
    td.price { font-weight: 600; color: var(--accent); }

    /* ── Loading / empty ── */
    .centered { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 14px; color: var(--muted); text-align: center; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .centered h3 { color: var(--text); font-size: 1rem; }
    .centered p { font-size: .82rem; line-height: 1.6; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
    code { background: var(--surface2); border: 1px solid var(--border); padding: 1px 7px; border-radius: 4px; font-family: monospace; color: var(--accent); font-size: .85em; }
    .progress-bar { width: 240px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
  </style>
</head>
<body>

<header>
  <div class="logo">🃏</div>
  <div>
    <h1>One Piece TCG Preistracker</h1>
    <p>Booster Box Preise – OP-01 bis OP-15</p>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <span id="lastUpdate">Lade Daten...</span>
    <button class="refresh-btn" onclick="refreshData()">⟳ Aktualisieren</button>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-header">Sets</div>
    <div class="set-list" id="setList"></div>
    <div class="sidebar-footer">
      <button class="compare-btn" id="compareBtn" onclick="toggleCompare()">⊞ Alle vergleichen</button>
    </div>
  </aside>

  <main id="main">
    <div class="centered">
      <div class="spinner"></div>
      <h3>Preise werden geladen</h3>
      <p>Scraper läuft für alle 15 Sets...<br>Einen Moment bitte.</p>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </main>
</div>

<script>
  const fmt = c => '$' + (c/100).toFixed(2);
  const fmtDate = ts => new Date(ts).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'});

  let allSetsData = {};
  let activeSet = 'op14';
  let compareMode = false;
  let mainChart = null;
  let miniCharts = {};

  // ── Daten kombinieren (history + snapshots, dedupliziert) ──
  function getPoints(setData) {
    if (!setData) return [];
    const combined = [...(setData.history||[]), ...(setData.snapshots||[])];
    const seen = new Set();
    return combined
      .filter(p => { if(seen.has(p[0])) return false; seen.add(p[0]); return true; })
      .sort((a,b) => a[0]-b[0]);
  }

  function calcStats(points) {
    if (!points.length) return null;
    const prices = points.map(p => p[1]);
    const min = Math.min(...prices), max = Math.max(...prices);
    const avg = prices.reduce((a,b)=>a+b,0)/prices.length;
    const latest = prices[prices.length-1], first = prices[0];
    const change = latest - first;
    const changePct = ((change/first)*100).toFixed(1);
    return {min,max,avg:Math.round(avg),latest,change,changePct};
  }

  // ── Sidebar aufbauen ──
  function buildSidebar(data) {
    const list = document.getElementById('setList');
    list.innerHTML = '';
    const sets = data.sets || {};

    ['op01','op02','op03','op04','op05','op06','op07','op08',
     'op09','op10','op11','op12','op13','op14','op15'].forEach(id => {
      const s = sets[id];
      const name = s ? s.name : id.toUpperCase();
      const available = s && s.available !== false;
      const points = s ? getPoints(s) : [];
      const latest = points.length ? points[points.length-1][1] : null;
      const opNum = id.replace('op','OP-');

      const el = document.createElement('div');
      el.className = 'set-item' + (id===activeSet?' active':'') + (!available?' unavailable':'');
      el.dataset.id = id;
      el.innerHTML = `
        <span class="set-badge">${opNum}</span>
        <span class="set-name">${name.replace(/OP-\d+\s*/,'')}</span>
        ${latest ? `<span class="set-price">${fmt(latest)}</span>` : ''}
      `;
      if (available) el.onclick = () => selectSet(id);
      list.appendChild(el);
    });
  }

  function selectSet(id) {
    if (compareMode) { compareMode = false; document.getElementById('compareBtn').classList.remove('active'); }
    activeSet = id;
    document.querySelectorAll('.set-item').forEach(el => el.classList.toggle('active', el.dataset.id===id));
    renderDetail(id);
  }

  // ── Detail-Ansicht ──
  function renderDetail(id) {
    const setData = allSetsData[id];
    const points = getPoints(setData);
    const stats = calcStats(points);
    const main = document.getElementById('main');

    if (!points.length) {
      main.innerHTML = `<div class="centered"><h3>Keine Daten für ${id.toUpperCase()}</h3><p>Möglicherweise noch nicht auf PriceCharting verfügbar.</p></div>`;
      return;
    }

    const isUp = stats.change >= 0;
    main.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card c-current">
          <div class="stat-label">Aktueller Preis</div>
          <div class="stat-value">${fmt(stats.latest)}</div>
          <div class="stat-sub">Letzter Datenpunkt</div>
        </div>
        <div class="stat-card c-min">
          <div class="stat-label">Tiefstkurs</div>
          <div class="stat-value">${fmt(stats.min)}</div>
          <div class="stat-sub">im Zeitraum</div>
        </div>
        <div class="stat-card c-max">
          <div class="stat-label">Höchstkurs</div>
          <div class="stat-value">${fmt(stats.max)}</div>
          <div class="stat-sub">im Zeitraum</div>
        </div>
        <div class="stat-card c-avg">
          <div class="stat-label">Durchschnitt</div>
          <div class="stat-value">${fmt(stats.avg)}</div>
          <div class="stat-sub">über alle Daten</div>
        </div>
        <div class="stat-card c-chg">
          <div class="stat-label">Entwicklung</div>
          <div class="badge ${isUp?'up':'down'}">${isUp?'▲':'▼'} ${isUp?'+':''}${fmt(stats.change)} (${isUp?'+':''}${stats.changePct}%)</div>
          <div class="stat-sub">seit Aufzeichnungsbeginn</div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title">${setData.name} – Preisverlauf</div>
          <div class="range-btns">
            <button class="range-btn" onclick="filterRange(30,this)">30T</button>
            <button class="range-btn" onclick="filterRange(90,this)">3M</button>
            <button class="range-btn" onclick="filterRange(180,this)">6M</button>
            <button class="range-btn active" onclick="filterRange(0,this)">Alle</button>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      </div>

      <div class="two-col">
        <div class="table-card">
          <div class="table-head-row">Preisverlauf (letzte ${Math.min(points.length,50)} Einträge)</div>
          <table>
            <thead><tr><th>Datum</th><th>Preis</th></tr></thead>
            <tbody>
              ${[...points].reverse().slice(0,50).map(p=>`<tr><td>${fmtDate(p[0])}</td><td class="price">${fmt(p[1])}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>

        <div class="table-card">
          <div class="table-head-row">
            Letzte Verkäufe
            <span style="font-size:.7rem;color:var(--muted);font-weight:400;margin-left:8px">via PriceCharting</span>
          </div>
          ${(() => {
            const sales = setData.recent_sales || [];
            if (!sales.length) return `<div style="padding:24px 20px;color:var(--muted);font-size:.83rem">Noch keine Verkaufsdaten</div>`;
            return `<table>
              <thead><tr><th>Datum</th><th>Verkaufspreis</th></tr></thead>
              <tbody>
                ${sales.map(s => `
                  <tr>
                    <td>${s.date}</td>
                    <td class="price">\$${s.price.toFixed(2)}</td>
                  </tr>`).join('')}
              </tbody>
            </table>`;
          })()}
        </div>
      </div>
    `;

    window._detailPoints = points;
    buildMainChart(points);
  }

  function filterRange(days, btn) {
    document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    let pts = window._detailPoints;
    if (days > 0) {
      const cutoff = Date.now() - days*86400*1000;
      pts = pts.filter(p=>p[0]>=cutoff);
    }
    if (pts.length < 2) pts = window._detailPoints;
    buildMainChart(pts);
  }

  function buildMainChart(points) {
    if (mainChart) mainChart.destroy();
    const ctx = document.getElementById('mainChart').getContext('2d');
    const grad = ctx.createLinearGradient(0,0,0,240);
    grad.addColorStop(0,'rgba(232,184,75,0.28)');
    grad.addColorStop(1,'rgba(232,184,75,0)');

    mainChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: points.map(p=>new Date(p[0])),
        datasets: [{
          data: points.map(p=>p[1]/100),
          borderColor: '#e8b84b', backgroundColor: grad,
          borderWidth: 2.5, pointRadius: points.length<30?5:2,
          pointHoverRadius:7, pointBackgroundColor:'#e8b84b',
          tension: 0.35, fill: true,
        }]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'#1e2535',borderColor:'#2a3347',borderWidth:1,
            titleColor:'#7a8aaa',bodyColor:'#dde3f0',padding:12,
            callbacks:{
              title:items=>fmtDate(items[0].parsed.x),
              label:item=>` $${item.parsed.y.toFixed(2)}`,
            }
          }
        },
        scales:{
          x:{type:'time',time:{unit:'week',displayFormats:{week:'dd.MM.yy'}},grid:{color:'#1e2535'},ticks:{color:'#7a8aaa',maxTicksLimit:8,font:{size:11}}},
          y:{grid:{color:'#1e2535'},ticks:{color:'#7a8aaa',font:{size:11},callback:v=>'$'+v.toFixed(0)}}
        }
      }
    });
  }

  // ── Vergleichsansicht ──
  function toggleCompare() {
    compareMode = !compareMode;
    document.getElementById('compareBtn').classList.toggle('active', compareMode);
    if (compareMode) renderCompare();
    else renderDetail(activeSet);
  }

  function renderCompare() {
    const sets = allSetsData;
    const ids = ['op01','op02','op03','op04','op05','op06','op07','op08','op09','op10','op11','op12','op13','op14','op15'];
    const main = document.getElementById('main');

    const cards = ids.map(id => {
      const s = sets[id];
      const pts = s ? getPoints(s) : [];
      const stats = calcStats(pts);
      const available = s && s.available !== false && pts.length > 0;
      const name = s ? s.name.replace(/OP-\d+\s*/,'') : id.toUpperCase();
      const opNum = id.replace('op','OP-');
      const isUp = stats && stats.change >= 0;

      return `
        <div class="compare-card${available?'':' unavailable'}" onclick="${available?`selectSet('${id}')`:''}" data-id="${id}">
          <div class="op-id">${opNum}</div>
          <div class="op-name">${name}</div>
          ${stats ? `
            <div class="op-price">${fmt(stats.latest)}</div>
            <div class="op-change">
              <span class="badge ${isUp?'up':'down'}" style="font-size:.68rem;padding:1px 6px">
                ${isUp?'▲':'▼'} ${isUp?'+':''}${stats.changePct}%
              </span>
            </div>
            <canvas class="compare-mini-chart" id="mini_${id}"></canvas>
          ` : '<div class="op-price" style="color:var(--muted);font-size:.9rem">N/A</div>'}
        </div>
      `;
    }).join('');

    main.innerHTML = `<div class="compare-grid">${cards}</div>`;

    // Mini-Charts zeichnen
    ids.forEach(id => {
      const s = sets[id];
      if (!s) return;
      const pts = getPoints(s);
      if (pts.length < 2) return;
      const canvas = document.getElementById('mini_'+id);
      if (!canvas) return;

      new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
          labels: pts.map(p=>new Date(p[0])),
          datasets: [{
            data: pts.map(p=>p[1]/100),
            borderColor: '#e8b84b', borderWidth: 1.5,
            pointRadius: 0, tension: 0.4, fill: false,
          }]
        },
        options: {
          responsive:false, animation:false,
          plugins:{legend:{display:false},tooltip:{enabled:false}},
          scales:{x:{display:false},y:{display:false}}
        }
      });
    });
  }

  // ── Daten laden ──
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

  async function refreshData() {
    document.getElementById('lastUpdate').textContent = 'Aktualisiere...';

    if (isLocal) {
      // Lokal: Scraper über API anstoßen
      document.getElementById('main').innerHTML = `<div class="centered"><div class="spinner"></div><h3>Scraper läuft</h3><p>Alle 15 Sets werden abgefragt...</p><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:5%"></div></div></div>`;
      let p = 5;
      const interval = setInterval(() => {
        p = Math.min(p+4, 90);
        const el = document.getElementById('progressFill');
        if (el) el.style.width = p + '%';
      }, 1500);
      try {
        const resp = await fetch('/api/update');
        clearInterval(interval);
        if (!resp.ok) throw new Error('Server nicht erreichbar');
        const json = await resp.json();
        if (!json.ok) throw new Error(json.error);
        applyData(json.data);
      } catch (e) {
        clearInterval(interval);
        await loadStatic();
      }
    } else {
      // GitHub Pages / statisch: JSON direkt laden
      document.getElementById('main').innerHTML = `<div class="centered"><div class="spinner"></div><h3>Daten werden geladen</h3><p>Preisdaten werden abgerufen...</p></div>`;
      await loadStatic();
    }
  }

  async function loadStatic() {
    try {
      const resp = await fetch('prices_all.json?t=' + Date.now());
      if (!resp.ok) throw new Error('Keine Preisdaten gefunden');
      const data = await resp.json();
      applyData(data);
    } catch (e) {
      showError(e.message);
    }
  }

  function applyData(data) {
    allSetsData = data.sets || {};

    if (data.last_updated) {
      const d = new Date(data.last_updated);
      document.getElementById('lastUpdate').textContent =
        'Zuletzt: ' + d.toLocaleDateString('de-DE') + ' ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    }

    buildSidebar(data);

    if (compareMode) renderCompare();
    else {
      // Wähle aktivstes Set mit Daten
      if (!allSetsData[activeSet]?.available) {
        const first = ['op01','op02','op03','op04','op05','op06','op07','op08','op09','op10','op11','op12','op13','op14','op15']
          .find(id => allSetsData[id]?.available && getPoints(allSetsData[id]).length > 0);
        if (first) activeSet = first;
      }
      renderDetail(activeSet);
      document.querySelectorAll('.set-item').forEach(el => el.classList.toggle('active', el.dataset.id===activeSet));
    }
  }

  function showError(msg) {
    document.getElementById('main').innerHTML = `
      <div class="centered">
        <h3>Fehler beim Laden</h3>
        <p>${msg}<br><br>Starte den Server mit <code>python server.py</code></p>
      </div>`;
  }

  // Start
  refreshData();
</script>
</body>
</html>
