<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Piece TCG Preistracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    :root {
      --bg:         #F2F2F7;
      --surface:    #FFFFFF;
      --surface2:   #F2F2F7;
      --surface3:   #E5E5EA;
      --border:     rgba(0,0,0,.08);
      --border2:    rgba(0,0,0,.14);
      --accent:     #007AFF;
      --accent-dim: rgba(0,122,255,.08);
      --blue:       #007AFF;
      --green:      #34C759;
      --red:        #FF3B30;
      --purple:     #AF52DE;
      --orange:     #FF9500;
      --text:       #1C1C1E;
      --text2:      #636366;
      --text3:      #AEAEB2;
      --radius:     12px;
      --shadow:     0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
      --shadow-lg:  0 4px 24px rgba(0,0,0,.10), 0 1px 4px rgba(0,0,0,.06);
      --sidebar:    260px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 14px; -webkit-font-smoothing: antialiased; }

    /* ══ SCROLLBAR ══ */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 4px; }

    /* ══ HEADER ══ */
    header {
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; position: relative; z-index: 100;
    }
    .logo {
      width: 32px; height: 32px; flex-shrink: 0;
      background: linear-gradient(145deg, #007AFF 0%, #5856D6 100%);
      border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px;
      box-shadow: 0 2px 8px rgba(0,122,255,.35);
    }
    .header-title { font-size: .93rem; font-weight: 700; letter-spacing: -.02em; color: var(--text); }
    .header-sub { font-size: .7rem; color: var(--text3); margin-top: 1px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(52,199,89,.4)} 50%{opacity:.7;box-shadow:0 0 0 4px rgba(52,199,89,0)} }
    #lastUpdate { font-size: .7rem; color: var(--text3); }
    .icon-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--text2);
      width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: all .15s; box-shadow: var(--shadow);
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }

    /* ══ GLOBAL SEARCH ══ */
    .gsearch-wrap { position: relative; }
    .gsearch {
      background: rgba(118,118,128,.12); border: none; color: var(--text);
      padding: 6px 12px 6px 32px; border-radius: 10px; font-size: .8rem; width: 220px;
      outline: none; font-family: inherit; transition: all .2s;
    }
    .gsearch:focus { background: var(--surface); box-shadow: 0 0 0 3px rgba(0,122,255,.2); width: 280px; }
    .gsearch::placeholder { color: var(--text3); }
    .gsearch-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: .8rem; pointer-events: none; }
    .gsearch-drop {
      position: absolute; top: calc(100% + 8px); right: 0;
      width: 420px; background: rgba(255,255,255,.95);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); z-index: 999; overflow: hidden; display: none;
    }
    .gsearch-drop.open { display: block; }
    .gsd-header { padding: 8px 14px; font-size: .63rem; text-transform: uppercase; letter-spacing: .09em; color: var(--text3); border-bottom: 1px solid var(--border); font-weight: 600; }
    .gsd-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 14px;
      cursor: pointer; transition: background .1s; border-top: 1px solid var(--border);
    }
    .gsd-item:first-of-type { border-top: none; }
    .gsd-item:hover { background: var(--surface2); }
    .gsd-set { font-size: .62rem; font-weight: 700; color: var(--text3); font-family: 'SF Mono', 'Menlo', monospace; flex-shrink: 0; width: 38px; }
    .gsd-name { font-size: .82rem; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gsd-name mark { background: rgba(0,122,255,.12); color: var(--accent); border-radius: 2px; }
    .gsd-prices { display: flex; gap: 8px; flex-shrink: 0; }
    .gsd-price { font-size: .75rem; font-weight: 600; }
    .gsd-price.ug { color: var(--accent); }
    .gsd-price.p10 { color: var(--purple); }
    .gsd-empty { padding: 18px 14px; text-align: center; color: var(--text3); font-size: .8rem; }

    /* ══ LAYOUT ══ */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ══ SIDEBAR ══ */
    aside {
      width: var(--sidebar); background: rgba(255,255,255,.7);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    .sidebar-top {
      padding: 12px 14px 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-label { font-size: .63rem; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); font-weight: 600; }
    .set-list { overflow-y: auto; flex: 1; padding: 4px 8px 8px; display: flex; flex-direction: column; gap: 2px; }

    .set-item {
      display: flex; align-items: center; gap: 0;
      padding: 0; cursor: pointer;
      border-radius: 10px;
      transition: background .12s;
      position: relative;
    }
    .set-item:hover { background: rgba(0,0,0,.04); }
    .set-item.active { background: var(--accent-dim); }
    .set-item.unavailable { opacity: .3; pointer-events: none; }

    .set-num {
      width: 40px; flex-shrink: 0; text-align: center;
      font-size: .63rem; font-weight: 700; font-family: 'SF Mono', 'Menlo', monospace;
      color: var(--text3); padding: 11px 0;
    }
    .set-item.active .set-num { color: var(--accent); }

    .set-info { flex: 1; padding: 9px 8px 9px 0; min-width: 0; }
    .set-sname { font-size: .78rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text2); }
    .set-item.active .set-sname { color: var(--accent); font-weight: 600; }
    .set-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .set-price-small { font-size: .7rem; font-weight: 700; color: var(--text2); }
    .set-item.active .set-price-small { color: var(--accent); }
    .trend-tag { font-size: .58rem; padding: 1px 5px; border-radius: 4px; font-weight: 600; }
    .trend-tag.up { background: rgba(52,199,89,.12); color: var(--green); }
    .trend-tag.dn { background: rgba(255,59,48,.1); color: var(--red); }

    .sidebar-footer { padding: 8px 10px; border-top: 1px solid var(--border); }
    .compare-btn {
      width: 100%; background: transparent; border: 1px solid var(--border);
      color: var(--text2); padding: 7px 10px; border-radius: 9px; font-size: .75rem;
      cursor: pointer; transition: all .15s; font-family: inherit; text-align: left; display: flex; align-items: center; gap: 7px;
      box-shadow: var(--shadow);
    }
    .compare-btn:hover { background: var(--surface2); color: var(--text); }
    .compare-btn.active { background: rgba(0,122,255,.08); border-color: rgba(0,122,255,.3); color: var(--blue); }

    /* ══ MAIN ══ */
    main { flex: 1; overflow-y: auto; padding: 20px 22px; }

    /* ══ PAGE TITLE ══ */
    .page-title { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
    .page-title h2 { font-size: 1.15rem; font-weight: 700; letter-spacing: -.02em; }
    .page-title .pc-link { font-size: .72rem; color: var(--text3); text-decoration: none; transition: color .15s; }
    .page-title .pc-link:hover { color: var(--blue); }

    /* ══ TABS ══ */
    .tabs { display: flex; gap: 0; margin-bottom: 20px; background: rgba(118,118,128,.1); border-radius: 10px; padding: 3px; }
    .tab-btn {
      background: none; border: none; color: var(--text2); padding: 6px 16px;
      font-size: .8rem; cursor: pointer; border-radius: 8px;
      transition: all .15s; font-family: inherit; display: flex; align-items: center; gap: 6px;
      font-weight: 500;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,.1), 0 0 0 .5px rgba(0,0,0,.05); }
    .tab-count { background: var(--surface2); color: var(--text3); font-size: .6rem; padding: 1px 5px; border-radius: 8px; font-weight: 600; }
    .tab-btn.active .tab-count { background: var(--surface2); color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ══ PAGE HEADER WITH BOX IMAGE ══ */
    .set-header { display: flex; align-items: center; gap: 18px; margin-bottom: 18px; }
    .box-img { width: 80px; height: 80px; object-fit: contain; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; box-shadow: var(--shadow); }
    .box-img-placeholder { width: 80px; height: 80px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; display:flex; align-items:center; justify-content:center; font-size:2rem; box-shadow: var(--shadow); }
    .set-header-info h2 { font-size: 1.15rem; font-weight: 700; letter-spacing: -.02em; }
    .set-header-info .pc-link { font-size: .72rem; color: var(--text3); text-decoration: none; transition: color .15s; display: inline-block; margin-top: 4px; }
    .set-header-info .pc-link:hover { color: var(--blue); }

    /* ══ CARD IMAGE HOVER PREVIEW ══ */
    .card-img-thumb { width: 36px; height: 50px; object-fit: contain; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; transition: transform .15s, box-shadow .15s; vertical-align: middle; }
    .card-img-thumb:hover { transform: scale(1.06); box-shadow: var(--shadow-lg); }
    td.card-img-cell { width: 50px; padding: 5px 8px !important; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(8px); z-index: 9999; align-items: center; justify-content: center; cursor: pointer; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 340px; max-height: 80vh; border-radius: 16px; box-shadow: 0 32px 80px rgba(0,0,0,.4); }

    /* ══ STAT ROW ══ */
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr) 1.4fr; gap: 10px; margin-bottom: 16px; }
    .stat-box {
      background: var(--surface); border: none; border-radius: var(--radius);
      padding: 16px 18px; position: relative; overflow: hidden;
      box-shadow: var(--shadow);
    }
    .stat-box::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius: var(--radius) var(--radius) 0 0; }
    .stat-box.s-cur::before { background: var(--accent); }
    .stat-box.s-min::before { background: var(--green); }
    .stat-box.s-max::before { background: var(--red); }
    .stat-box.s-avg::before { background: var(--purple); }
    .stat-box.s-chg::before { background: var(--orange); }
    .s-label { font-size: .6rem; text-transform: uppercase; letter-spacing: .09em; color: var(--text3); font-weight: 600; margin-bottom: 8px; }
    .s-val { font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; line-height: 1; color: var(--text); }
    .s-sub { font-size: .67rem; color: var(--text3); margin-top: 5px; }
    .chg-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: .78rem; font-weight: 700; margin-top: 4px; }
    .chg-pill.up { background: rgba(52,199,89,.1); color: var(--green); }
    .chg-pill.dn { background: rgba(255,59,48,.08); color: var(--red); }

    /* ══ CHART ══ */
    .chart-box { background: var(--surface); border: none; border-radius: var(--radius); padding: 20px 22px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .chart-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .chart-lbl { font-size: .8rem; font-weight: 600; color: var(--text); }
    .range-row { display: flex; gap: 3px; background: rgba(118,118,128,.1); padding: 2px; border-radius: 8px; }
    .rng { background: transparent; border: none; color: var(--text3); padding: 3px 11px; border-radius: 6px; font-size: .71rem; cursor: pointer; transition: all .15s; font-family: inherit; font-weight: 500; }
    .rng:hover { color: var(--text); }
    .rng.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .chart-wrap { position: relative; height: 300px; }

    /* ══ BOTTOM GRID ══ */
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    @media (max-width: 800px) { .bottom-grid { grid-template-columns: 1fr; } .stat-row { grid-template-columns: repeat(2,1fr); } }

    /* ══ TABLE CARD ══ */
    .tbl-box { background: var(--surface); border: none; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .tbl-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .tbl-title { font-size: .82rem; font-weight: 600; color: var(--text); }
    .tbl-badge { font-size: .63rem; color: var(--text3); background: var(--surface2); padding: 2px 8px; border-radius: 6px; font-weight: 500; }
    .ext-link { font-size: .7rem; color: var(--blue); text-decoration: none; background: rgba(0,122,255,.08); padding: 4px 10px; border-radius: 7px; white-space: nowrap; transition: all .15s; font-weight: 500; }
    .ext-link:hover { background: rgba(0,122,255,.15); }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 8px 16px; text-align: left; font-size: .6rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); background: var(--surface2); font-weight: 600; border-bottom: 1px solid var(--border); }
    tbody tr { border-top: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: #F9F9FB; }
    tbody td { padding: 9px 16px; font-size: .8rem; }
    td.price { font-weight: 700; color: var(--text); font-size: .85rem; }
    td.rank { color: var(--text3); font-size: .68rem; width: 32px; text-align: right; padding-right: 6px; font-family: 'SF Mono','Menlo',monospace; }
    td.card-num { font-family: 'SF Mono','Menlo',monospace; font-size: .68rem; color: var(--text3); }
    td.card-name a { color: var(--text); text-decoration: none; transition: color .12s; font-weight: 500; }
    td.card-name a:hover { color: var(--accent); }

    /* ══ CARD SEARCH ══ */
    .search-wrap { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .card-search { width: 100%; background: rgba(118,118,128,.1); border: none; color: var(--text); padding: 7px 12px; border-radius: 8px; font-size: .8rem; outline: none; font-family: inherit; transition: all .2s; }
    .card-search:focus { background: var(--surface2); box-shadow: 0 0 0 3px rgba(0,122,255,.15); }
    .card-search::placeholder { color: var(--text3); }

    /* ══ COMPARE GRID ══ */
    .cmp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 10px; }
    .cmp-card {
      background: var(--surface); border: none; border-radius: var(--radius);
      padding: 16px; cursor: pointer; transition: all .2s;
      box-shadow: var(--shadow);
    }
    .cmp-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .cmp-card.unavailable { opacity: .3; pointer-events: none; }
    .cmp-op { font-size: .6rem; font-weight: 700; color: var(--text3); font-family: 'SF Mono','Menlo',monospace; margin-bottom: 5px; letter-spacing: .05em; }
    .cmp-name { font-size: .78rem; font-weight: 600; line-height: 1.35; margin-bottom: 10px; color: var(--text); }
    .cmp-price { font-size: 1.3rem; font-weight: 800; color: var(--text); letter-spacing: -.03em; }
    .cmp-trend { margin-top: 4px; }
    .cmp-canvas { height: 44px; margin-top: 10px; display: block; }

    /* ══ LOADING ══ */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 320px; gap: 14px; color: var(--text3); }
    .spinner { width: 30px; height: 30px; border: 2.5px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading h3 { font-size: .95rem; color: var(--text2); }
    .loading p { font-size: .78rem; line-height: 1.6; text-align: center; }
    .pbar { width: 220px; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
    .pfill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }
    .no-data { padding: 40px 20px; text-align: center; color: var(--text3); font-size: .82rem; }

    /* ══ INVENTORY BUTTON ══ */
    .inv-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--text2);
      height: 30px; padding: 0 12px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      font-size: .78rem; font-weight: 600; transition: all .15s; font-family: inherit; white-space: nowrap;
      box-shadow: var(--shadow);
    }
    .inv-btn:hover { background: var(--surface2); color: var(--text); }
    .inv-btn.has-items { border-color: rgba(0,122,255,.3); color: var(--accent); background: rgba(0,122,255,.06); }
    .inv-count-badge {
      background: var(--accent); color: #fff; font-size: .6rem; font-weight: 700;
      min-width: 16px; height: 16px; border-radius: 8px; display: inline-flex;
      align-items: center; justify-content: center; padding: 0 4px;
    }

    /* ══ INVENTORY DRAWER ══ */
    .inv-drawer {
      position: fixed; top: 52px; right: 0; bottom: 0;
      width: 340px; background: rgba(242,242,247,.95);
      backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 500;
      transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
      box-shadow: -12px 0 40px rgba(0,0,0,.08);
    }
    .inv-drawer.open { transform: translateX(0); }
    .inv-drawer-head {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .inv-drawer-title { font-size: .9rem; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
    .inv-close-btn {
      background: rgba(118,118,128,.12); border: none; color: var(--text2); cursor: pointer; font-size: .85rem;
      width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      transition: all .12s;
    }
    .inv-close-btn:hover { background: rgba(118,118,128,.2); color: var(--text); }

    /* Stats row */
    .inv-stats { display: flex; gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .inv-stat { flex: 1; padding: 12px 14px; text-align: center; border-right: 1px solid var(--border); }
    .inv-stat:last-child { border-right: none; }
    .inv-stat-label { font-size: .58rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); font-weight: 600; }
    .inv-stat-val { font-size: 1.05rem; font-weight: 800; color: var(--text); margin-top: 3px; letter-spacing: -.02em; }
    .inv-stat-val.blue { color: var(--accent); }

    /* Chart section */
    .inv-chart-wrap {
      padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      background: var(--surface);
    }
    .inv-chart-title { font-size: .63rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); font-weight: 600; align-self: flex-start; }
    #invPieChart { max-height: 150px; }

    /* Card list */
    .inv-list { flex: 1; overflow-y: auto; }
    .inv-empty { padding: 48px 20px; text-align: center; color: var(--text3); font-size: .82rem; line-height: 1.7; }
    .inv-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 14px;
      border-bottom: 1px solid var(--border); transition: background .1s;
      background: var(--surface);
    }
    .inv-item:hover { background: #FAFAFA; }
    .inv-item-img { width: 28px; height: 39px; object-fit: contain; border-radius: 5px; border: 1px solid var(--border); flex-shrink: 0; box-shadow: var(--shadow); }
    .inv-item-img-placeholder { width: 28px; height: 39px; background: var(--surface2); border-radius: 5px; border: 1px solid var(--border); flex-shrink: 0; }
    .inv-item-info { flex: 1; min-width: 0; }
    .inv-item-name { font-size: .75rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
    .inv-item-meta { font-size: .62rem; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .inv-item-date { font-size: .59rem; color: var(--text3); margin-top: 1px; }
    .inv-item-price { font-size: .78rem; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .inv-qty { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .qty-btn {
      background: rgba(118,118,128,.1); border: none; color: var(--text2);
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; transition: all .12s; line-height: 1;
    }
    .qty-btn:hover { background: rgba(118,118,128,.2); color: var(--text); }
    .qty-num { font-size: .75rem; font-weight: 700; min-width: 16px; text-align: center; color: var(--text); }
    .inv-clear-btn {
      margin: 10px 14px; background: transparent; border: 1px solid rgba(255,59,48,.2);
      color: var(--red); padding: 7px; border-radius: 9px; font-size: .72rem; cursor: pointer;
      font-family: inherit; transition: all .15s; width: calc(100% - 28px); flex-shrink: 0; font-weight: 500;
    }
    .inv-clear-btn:hover { background: rgba(255,59,48,.06); }

    /* ══ ADD TO INVENTORY BUTTON ══ */
    .add-inv-btn {
      background: rgba(118,118,128,.1); border: none; color: var(--text3);
      width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 1rem;
      display: inline-flex; align-items: center; justify-content: center; transition: all .15s;
      flex-shrink: 0; line-height: 1;
    }
    .add-inv-btn:hover { background: rgba(0,122,255,.1); color: var(--accent); }
    .add-inv-btn.in-inv { background: rgba(0,122,255,.1); color: var(--accent); }
    td.inv-cell { width: 36px; padding: 5px 4px !important; text-align: center; }

    /* ══ GRADE PICKER ══ */
    .grade-picker {
      position: fixed; z-index: 9999;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 12px; padding: 6px;
      display: flex; flex-direction: column; gap: 3px;
      box-shadow: var(--shadow-lg);
    }
    .grade-picker-label { font-size: .62rem; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; padding: 4px 8px 4px; font-weight: 600; }
    .grade-opt {
      background: transparent; border: none; color: var(--text);
      border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: .8rem;
      text-align: left; transition: background .1s; white-space: nowrap; font-family: inherit;
    }
    .grade-opt:hover { background: rgba(0,122,255,.08); color: var(--accent); }
    .grade-opt .grade-price { color: var(--text3); font-size: .72rem; margin-left: 6px; }

    /* ══ INVENTORY GRADE BADGE ══ */
    .inv-grade-badge {
      font-size: .58rem; font-weight: 600; padding: 1px 5px; border-radius: 4px;
      display: inline-block;
    }
    .inv-grade-badge.ungraded { background: rgba(142,142,147,.12); color: var(--text2); }
    .inv-grade-badge.psa9 { background: rgba(0,122,255,.1); color: var(--blue); }
    .inv-grade-badge.psa10 { background: rgba(175,82,222,.1); color: var(--purple); }
    .inv-grade-badge.display { background: rgba(255,149,0,.12); color: var(--orange); }

    /* ══ DISPLAY BUTTON ══ */
    .add-display-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,149,0,.08); border: 1px solid rgba(255,149,0,.3);
      color: var(--orange); padding: 5px 11px; border-radius: 8px;
      font-size: .73rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .15s; white-space: nowrap;
    }
    .add-display-btn:hover { background: rgba(255,149,0,.15); border-color: var(--orange); }
    .add-display-btn.in-inv { background: rgba(255,149,0,.15); border-color: var(--orange); }

    /* ══ SIDEBAR SPARKLINE ══ */
    .set-spark { flex-shrink: 0; width: 48px; height: 26px; margin-right: 8px; opacity: .75; }

    /* ══ HOVER CARD PREVIEW ══ */
    #cardHoverPreview {
      position: fixed; z-index: 8000; pointer-events: none;
      background: rgba(255,255,255,.97); border: 1px solid var(--border);
      border-radius: 14px; padding: 8px; box-shadow: var(--shadow-lg);
      display: none; transition: opacity .1s;
    }
    #cardHoverPreview img { width: 140px; height: auto; border-radius: 8px; display: block; }
    #cardHoverPreview .chp-name { font-size: .7rem; font-weight: 600; color: var(--text); margin-top: 6px; text-align: center; max-width: 140px; }
    #cardHoverPreview .chp-price { font-size: .75rem; font-weight: 700; color: var(--accent); text-align: center; margin-top: 2px; }

    /* ══ SCRAPER PROGRESS BAR ══ */
    #scraperBar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9000;
      background: rgba(255,255,255,.95); backdrop-filter: blur(12px);
      border-top: 1px solid var(--border); padding: 10px 20px 14px;
      display: none; align-items: center; gap: 14px;
      box-shadow: 0 -4px 20px rgba(0,0,0,.06);
    }
    #scraperBar.visible { display: flex; }
    .scraper-label { font-size: .78rem; font-weight: 600; color: var(--text); flex-shrink: 0; }
    .scraper-sub { font-size: .68rem; color: var(--text3); flex: 1; }
    .scraper-pbar { width: 200px; height: 4px; background: var(--surface3); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .scraper-pfill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s; }
    .scraper-cancel { font-size: .72rem; color: var(--red); background: none; border: none; cursor: pointer; font-family: inherit; padding: 2px 6px; border-radius: 5px; }
    .scraper-cancel:hover { background: rgba(255,59,48,.07); }

    /* ══ INVENTORY EXPORT & PURCHASE PRICE ══ */
    .inv-export-row { display: flex; gap: 6px; padding: 8px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .inv-export-btn {
      flex: 1; background: rgba(0,122,255,.07); border: 1px solid rgba(0,122,255,.2);
      color: var(--blue); padding: 5px 8px; border-radius: 8px; font-size: .7rem;
      cursor: pointer; font-family: inherit; font-weight: 600; transition: all .15s;
    }
    .inv-export-btn:hover { background: rgba(0,122,255,.13); }
    .inv-buy-price {
      width: 64px; background: rgba(118,118,128,.08); border: 1px solid var(--border);
      color: var(--text); padding: 3px 6px; border-radius: 6px; font-size: .72rem;
      outline: none; font-family: inherit; text-align: right;
    }
    .inv-buy-price:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,122,255,.12); }
    .inv-pnl { font-size: .72rem; font-weight: 700; flex-shrink: 0; min-width: 54px; text-align: right; }
    .inv-pnl.pos { color: var(--green); }
    .inv-pnl.neg { color: var(--red); }
    .inv-pnl.neu { color: var(--text3); }

    /* ══ PORTFOLIO HISTORY CHART ══ */
    .inv-history-wrap {
      padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
      background: var(--surface);
    }
    .inv-history-head {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
    }
    .inv-history-title { font-size: .63rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); font-weight: 600; }
    .inv-history-delta { font-size: .72rem; font-weight: 700; }
    .inv-history-delta.pos { color: var(--green); }
    .inv-history-delta.neg { color: var(--red); }
    .inv-history-delta.neu { color: var(--text3); }
    #invHistoryChart { height: 90px; }

    /* ══ BETTER EMPTY STATES ══ */
    .empty-state { padding: 48px 24px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .empty-state svg { opacity: .25; }
    .empty-state h4 { font-size: .9rem; font-weight: 600; color: var(--text2); }
    .empty-state p { font-size: .78rem; color: var(--text3); line-height: 1.6; max-width: 260px; }

    /* ══ HAMBURGER BUTTON ══ */
    .hamburger-btn {
      display: none; background: none; border: none; cursor: pointer;
      padding: 6px; border-radius: 8px; color: var(--text2); font-size: 1.15rem;
      flex-shrink: 0; transition: all .15s;
    }
    .hamburger-btn:hover { background: var(--surface2); color: var(--text); }

    /* ══ SIDEBAR OVERLAY (mobile) ══ */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35);
      z-index: 150; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    }
    .sidebar-overlay.open { display: block; }

    /* ══ MOBILE RESPONSIVE ══ */
    @media (max-width: 768px) {
      :root { --sidebar: 260px; }

      .hamburger-btn { display: flex; align-items: center; justify-content: center; }

      /* Sidebar becomes an overlay */
      aside {
        position: fixed; top: 52px; left: 0; bottom: 0;
        z-index: 200; transform: translateX(-100%);
        transition: transform .25s cubic-bezier(.4,0,.2,1);
        box-shadow: 8px 0 32px rgba(0,0,0,.12);
      }
      aside.mobile-open { transform: translateX(0); }

      /* Header: hide less important elements */
      #lastUpdate { display: none; }
      .pulse-dot { display: none; }
      .header-sub { display: none; }

      /* Search: narrower */
      .gsearch { width: 140px; }
      .gsearch:focus { width: 180px; }

      /* Main content: full width, less padding */
      main { padding: 14px 12px; }

      /* Stat row: 2 cols */
      .stat-row { grid-template-columns: repeat(2, 1fr); }

      /* Set header: stack vertically */
      .set-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .set-header .add-display-btn { align-self: flex-start; }

      /* Chart: shorter */
      .chart-wrap { height: 220px; }

      /* Card table: horizontal scroll */
      .tbl-box { overflow-x: auto; }
      table { min-width: 480px; }

      /* Inventory drawer: full width */
      .inv-drawer { width: 100%; top: 52px; border-left: none; border-top: 1px solid var(--border); }

      /* Compare grid: smaller min */
      .cmp-grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); }

      /* Scraper bar: compact */
      .scraper-pbar { width: 120px; }
      .scraper-sub { display: none; }

      /* Tabs: scroll if overflow */
      .tabs { overflow-x: auto; white-space: nowrap; }
      .tab-btn { flex-shrink: 0; padding: 6px 12px; }
    }

    @media (max-width: 480px) {
      header { padding: 0 12px; gap: 8px; }
      .header-title { font-size: .82rem; }

      /* Stat row: 2 cols still, but smaller */
      .stat-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .s-val { font-size: 1.2rem; }

      /* Search: icon only on very small */
      .gsearch { width: 110px; }
      .gsearch:focus { width: 150px; }

      /* Compare grid: 2 cols min */
      .cmp-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }

      main { padding: 10px 10px; }
    }
  </style>
</head>
<body>

<header>
  <button class="hamburger-btn" onclick="toggleSidebar()" title="Menü">☰</button>
  <div class="logo">🃏</div>
  <div>
    <div class="header-title">One Piece TCG Preistracker</div>
    <div class="header-sub">OP-01 bis OP-15 · Booster Box</div>
  </div>
  <div class="header-right">
    <button class="inv-btn" id="invBtn" onclick="toggleInventory()" title="Inventar">
      🗃 Inventar <span class="inv-count-badge" id="invCountBadge" style="display:none">0</span>
    </button>
    <div class="gsearch-wrap" id="gsearchWrap">
      <span class="gsearch-icon">🔍</span>
      <input class="gsearch" type="text" id="gsearch" placeholder="Karte suchen…"
             oninput="globalSearch(this.value)" onfocus="globalSearch(this.value)"
             autocomplete="off" spellcheck="false">
      <div class="gsearch-drop" id="gsearchDrop"></div>
    </div>
    <div class="pulse-dot"></div>
    <span id="lastUpdate">Laden...</span>
    <button class="icon-btn" onclick="refreshData()" title="Aktualisieren">⟳</button>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="layout">
  <aside id="sidebar">
    <div class="sidebar-top">
      <span class="sidebar-label">Sets</span>
    </div>
    <div class="set-list" id="setList"></div>
    <div class="sidebar-footer">
      <button class="compare-btn" id="compareBtn" onclick="toggleCompare()">
        <span>⊞</span> Alle Sets vergleichen
      </button>
    </div>
  </aside>

  <main id="main">
    <div class="loading">
      <div class="spinner"></div>
      <h3>Daten werden geladen</h3>
      <p>Preise werden abgerufen…</p>
      <div class="pbar"><div class="pfill" id="progressFill" style="width:0%"></div></div>
    </div>
  </main>
</div>

<div class="inv-drawer" id="invDrawer">
  <div class="inv-drawer-head">
    <span class="inv-drawer-title">Inventar</span>
    <button class="inv-close-btn" onclick="toggleInventory()">✕</button>
  </div>
  <div class="inv-stats">
    <div class="inv-stat">
      <div class="inv-stat-label">Gesamtwert</div>
      <div class="inv-stat-val" id="invTotalVal">$0.00</div>
    </div>
    <div class="inv-stat">
      <div class="inv-stat-label">Karten</div>
      <div class="inv-stat-val blue" id="invCardCount">0</div>
    </div>
  </div>
  <div class="inv-history-wrap" id="invHistoryWrap" style="display:none">
    <div class="inv-history-head">
      <span class="inv-history-title">Wertentwicklung</span>
      <span class="inv-history-delta neu" id="invHistoryDelta">–</span>
    </div>
    <canvas id="invHistoryChart"></canvas>
  </div>
  <div class="inv-chart-wrap" id="invChartWrap" style="display:none">
    <div class="inv-chart-title">Wertverteilung</div>
    <canvas id="invPieChart"></canvas>
  </div>
  <div class="inv-export-row" id="invExportRow" style="display:none">
    <button class="inv-export-btn" onclick="exportInventory('csv')">↓ CSV</button>
    <button class="inv-export-btn" onclick="exportInventory('json')">↓ JSON</button>
  </div>
  <div class="inv-list" id="invList"></div>
  <button class="inv-clear-btn" onclick="clearInventory()">Inventar leeren</button>
</div>

<div id="cardHoverPreview">
  <img id="chpImg" src="" alt="">
  <div class="chp-name" id="chpName"></div>
  <div class="chp-price" id="chpPrice"></div>
</div>

<div id="scraperBar">
  <span class="scraper-label">Preise werden aktualisiert</span>
  <span class="scraper-sub" id="scraperSub">Sets werden abgefragt…</span>
  <div class="scraper-pbar"><div class="scraper-pfill" id="scraperFill" style="width:0%"></div></div>
  <button class="scraper-cancel" onclick="cancelScraper()">Abbrechen</button>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  const fmt   = c => '$' + (c / 100).toFixed(2);
  const fmtD  = ts => new Date(ts).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });
  const SET_IDS = ['op01','op02','op03','op04','op05','op06','op07','op08','op09','op10','op11','op12','op13','op14','op15'];

  let allSets = {}, activeSet = 'op14', compareMode = false, mainChart = null;

  /* ── helpers ── */
  function getPoints(sd) {
    if (!sd) return [];
    const seen = new Set();
    return [...(sd.history||[]), ...(sd.snapshots||[])]
      .filter(p => { if (seen.has(p[0])) return false; seen.add(p[0]); return true; })
      .sort((a,b) => a[0]-b[0]);
  }

  function calcStats(pts) {
    if (!pts.length) return null;
    const v = pts.map(p=>p[1]);
    const min=Math.min(...v), max=Math.max(...v), avg=Math.round(v.reduce((a,b)=>a+b,0)/v.length);
    const latest=v[v.length-1], first=v[0], change=latest-first;
    return { min, max, avg, latest, first, change, pct: ((change/first)*100).toFixed(1) };
  }

  /* ── SIDEBAR ── */
  function buildSidebar(data) {
    const list = document.getElementById('setList');
    list.innerHTML = '';
    SET_IDS.forEach(id => {
      const sd = data.sets?.[id];
      const available = sd?.available !== false;
      const pts = getPoints(sd);
      const st = calcStats(pts);
      const name = sd?.name?.replace(/OP-\d+\s*/,'') ?? id.toUpperCase();
      const num = id.replace('op','OP-').replace('OP-0','OP-').replace(/OP-(\d)$/,'OP-0$1');

      const div = document.createElement('div');
      div.className = 'set-item' + (id===activeSet?' active':'') + (!available?' unavailable':'');
      div.dataset.id = id;
      div.innerHTML = `
        <div class="set-num">${id.replace('op','').replace(/^0/,'').padStart(2,'0')}</div>
        <div class="set-info">
          <div class="set-sname">${name}</div>
          <div class="set-meta">
            ${st ? `<span class="set-price-small">${fmt(st.latest)}</span>
                    <span class="trend-tag ${st.change>=0?'up':'dn'}">${st.change>=0?'▲':'▼'}${Math.abs(st.pct)}%</span>`
                 : '<span style="font-size:.68rem;color:var(--text3)">–</span>'}
          </div>
        </div>
        ${pts.length >= 2 ? `<canvas class="set-spark" id="spark_${id}" width="48" height="26"></canvas>` : ''}`;
      if (available) div.onclick = () => selectSet(id);
      list.appendChild(div);
    });
  }

  function buildSparklines(data) {
    SET_IDS.forEach(id => {
      const canvas = document.getElementById('spark_' + id);
      if (!canvas) return;
      const pts = getPoints(data.sets?.[id]);
      const recent = pts.slice(-30);
      if (recent.length < 2) return;
      const up = calcStats(recent)?.change >= 0;
      new Chart(canvas, {
        type: 'line',
        data: { labels: recent.map(p => p[0]), datasets: [{ data: recent.map(p => p[1]/100),
          borderColor: up ? '#34C759' : '#FF3B30', borderWidth: 1.5,
          pointRadius: 0, tension: .4, fill: false }] },
        options: { responsive: false, animation: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          scales: { x: { display: false }, y: { display: false } } }
      });
    });
  }

  function selectSet(id) {
    if (compareMode) { compareMode = false; document.getElementById('compareBtn').classList.remove('active'); }
    activeSet = id;
    document.querySelectorAll('.set-item').forEach(el => el.classList.toggle('active', el.dataset.id===id));
    renderDetail(id);
    closeSidebarOnMobile();
  }

  /* ── DETAIL VIEW ── */
  function renderDetail(id) {
    const sd = allSets[id];
    const pts = getPoints(sd);
    const st = calcStats(pts);
    const main = document.getElementById('main');

    if (!pts.length) {
      main.innerHTML = `<div class="empty-state" style="margin-top:60px">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="#636366" stroke-width="2.5"/><path d="M22 32h20M32 22v20" stroke="#636366" stroke-width="2.5" stroke-linecap="round"/></svg>
        <h4>Keine Daten verfügbar</h4>
        <p>${id.toUpperCase()} ist noch nicht auf PriceCharting gelistet oder wurde noch nicht gescraped.</p>
      </div>`;
      return;
    }

    const up = st.change >= 0;
    const cards = sd.cards || [];
    const sales = sd.recent_sales || [];
    const q = encodeURIComponent(sd.ebay_query || sd.name + ' Booster Box sealed');
    const ebayUrl = `https://www.ebay.com/sch/i.html?_nkw=${q}&LH_Sold=1&LH_Complete=1&LH_ItemCondition=1000&_sop=13`;

    main.innerHTML = `
      <div class="set-header">
        ${sd.box_img
          ? `<img class="box-img" src="${sd.box_img}" alt="${sd.name}" onclick="openLightbox('${sd.box_img.replace('/240.jpg','/400.jpg')}')">`
          : `<div class="box-img-placeholder">🃏</div>`}
        <div class="set-header-info">
          <h2>${sd.name}</h2>
          <a class="pc-link" href="${sd.url}" target="_blank">↗ PriceCharting</a>
        </div>
        <button class="add-display-btn${isDisplayInInv(id)?' in-inv':''}" id="dispbtn_${id}"
          onclick="addDisplayToInventory('${id}')">
          📦 Display${isDisplayInInv(id) ? ' ✓' : ' +'}
        </button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('ov',this)">Übersicht</button>
        <button class="tab-btn" onclick="switchTab('cards',this)">
          Einzelkarten <span class="tab-count">${cards.length}</span>
        </button>
      </div>

      <!-- TAB: Übersicht -->
      <div id="tab-ov" class="tab-panel active">

        <div class="stat-row">
          <div class="stat-box s-cur">
            <div class="s-label">Aktuell</div>
            <div class="s-val">${fmt(st.latest)}</div>
            <div class="s-sub">Letzter Datenpunkt</div>
          </div>
          <div class="stat-box s-min">
            <div class="s-label">Tiefstkurs</div>
            <div class="s-val">${fmt(st.min)}</div>
            <div class="s-sub">im Zeitraum</div>
          </div>
          <div class="stat-box s-max">
            <div class="s-label">Höchstkurs</div>
            <div class="s-val">${fmt(st.max)}</div>
            <div class="s-sub">im Zeitraum</div>
          </div>
          <div class="stat-box s-avg">
            <div class="s-label">Ø Durchschnitt</div>
            <div class="s-val">${fmt(st.avg)}</div>
            <div class="s-sub">über alle Daten</div>
          </div>
          <div class="stat-box s-chg">
            <div class="s-label">Entwicklung gesamt</div>

  /* ── CHART ── */
  function buildChart(pts) {
    if (mainChart) mainChart.destroy();
    const ctx = document.getElementById('mainChart').getContext('2d');
    const g = ctx.createLinearGradient(0,0,0,260);
    g.addColorStop(0,'rgba(0,122,255,.14)');
    g.addColorStop(1,'rgba(0,122,255,0)');
    mainChart = new Chart(ctx, {
      type:'line',
      data:{ labels:pts.map(p=>new Date(p[0])), datasets:[{
        data:pts.map(p=>p[1]/100), borderColor:'#007AFF', backgroundColor:g,
        borderWidth:2, pointRadius:pts.length<20?4:1.5, pointHoverRadius:6,
        pointBackgroundColor:'#007AFF', tension:.35, fill:true
      }]},
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'rgba(255,255,255,.96)', borderColor:'rgba(0,0,0,.08)', borderWidth:1,
            titleColor:'#AEAEB2', bodyColor:'#1C1C1E', padding:10,
            boxShadow:'0 4px 16px rgba(0,0,0,.08)',
            callbacks:{ title:i=>fmtD(i[0].parsed.x), label:i=>` $${i.parsed.y.toFixed(2)}` }
          }
        },
        scales:{
          x:{ type:'time', time:{unit:'week',displayFormats:{week:'dd.MM.yy'}},
              grid:{color:'rgba(0,0,0,.05)'}, ticks:{color:'#AEAEB2',maxTicksLimit:7,font:{size:10}} },
          y:{ grid:{color:'rgba(0,0,0,.05)'},
              ticks:{color:'#AEAEB2',font:{size:10},callback:v=>'$'+v.toFixed(0)} }
        }
      }
    });
  }

  function fRange(days, btn) {
    document.querySelectorAll('.rng').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    let pts = window._pts;
    if (days>0) { const c=Date.now()-days*86400000; pts=pts.filter(p=>p[0]>=c); }
    if (pts.length<2) pts=window._pts;
    buildChart(pts);
  }

  /* ── CARDS TAB ── */
  const fmtP = v => (v != null) ? `$${v.toFixed(2)}` : `<span style="color:var(--text3)">–</span>`;

  function renderCardsTab(sd) {
    const cards = sd.cards || [];
    if (!cards.length) return `<div class="empty-state">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect x="10" y="8" width="36" height="44" rx="5" stroke="#636366" stroke-width="2.5"/><path d="M18 20h20M18 28h14M18 36h10" stroke="#636366" stroke-width="2" stroke-linecap="round"/></svg>
      <h4>Keine Kartendaten</h4>
      <p>Kartendaten werden beim nächsten täglichen Update geladen.</p>
    </div>`;

    const setId = Object.keys(allSets).find(k => allSets[k] === sd) || '';
    const rows = cards.map((c,i) => {
      const ikey = setId + '__' + (c.number || c.name.replace(/\s+/g,'_').slice(0,30));
      const inInv = ['ungraded','psa9','psa10'].some(g => !!inventory[ikey + '__' + g]);
      const safeImg = c.img ? c.img.replace(/'/g, "\\'") : '';
      const safeName = c.name.replace(/'/g, "\\'");
      return `
      <tr class="cr" id="cr_${ikey}">
        <td class="card-img-cell">
          ${c.img
            ? `<img class="card-img-thumb" src="${c.img}" alt="${c.name}" loading="lazy"
                onclick="openLightbox('${safeImg}')"
                onmouseenter="showCardPreview(this,'${safeImg}',${JSON.stringify(c.name)},${c.price??null})"
                onmouseleave="hideCardPreview()">`
            : `<div style="width:36px;height:50px;background:var(--surface2);border-radius:4px;border:1px solid var(--border)"></div>`}
        </td>
        <td class="inv-cell">
          <button class="add-inv-btn${inInv?' in-inv':''}" id="addbtn_${ikey}"
            onclick='showGradePicker(event, ${JSON.stringify({name:c.name,number:c.number,price:c.price,grade9:c.grade9,psa10:c.psa10,img:c.img,url:c.url})}, "${setId}")'
            title="${inInv?'Im Inventar':'Zum Inventar hinzufügen'}">+</button>
        </td>
        <td class="rank">${i+1}</td>
        <td class="card-name"><a href="${c.url}" target="_blank">${c.name}</a></td>
        <td class="card-num">${c.number}</td>
        <td class="price">${fmtP(c.price)}</td>
        <td style="font-weight:700;color:var(--blue);font-size:.85rem">${fmtP(c.grade9)}</td>
        <td style="font-weight:700;color:var(--purple);font-size:.85rem">${fmtP(c.psa10)}</td>
      </tr>`;
    }).join('');

    return `
      <div class="tbl-box">
        <div class="tbl-head">
          <span class="tbl-title">Einzelkarten nach Wert</span>
          <span class="tbl-badge">${cards.length} Karten</span>
        </div>
        <div class="search-wrap">
          <input class="card-search" type="text" placeholder="Karte suchen…" oninput="filterCards(this.value)">
        </div>
        <table>
          <thead>
            <tr>
              <th></th>
              <th></th>
              <th>#</th>
              <th>Karte</th>
              <th>Nummer</th>
              <th>Ungraded</th>
              <th style="color:var(--blue)">Grade 9</th>
              <th style="color:var(--purple)">PSA 10</th>
            </tr>
          </thead>
          <tbody id="cardsBody">${rows}</tbody>
        </table>
      </div>`;
  }

  function filterCards(q) {
    q = q.toLowerCase();
    document.querySelectorAll('#cardsBody .cr').forEach(r => {
      r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  /* ── TABS ── */
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+name).classList.add('active');
  }

  /* ── COMPARE ── */
  function toggleCompare() {
    compareMode = !compareMode;
    document.getElementById('compareBtn').classList.toggle('active', compareMode);
    compareMode ? renderCompare() : renderDetail(activeSet);
    closeSidebarOnMobile();
  }

  function renderCompare() {
    const main = document.getElementById('main');
    const html = SET_IDS.map(id => {
      const sd = allSets[id];
      const pts = getPoints(sd);
      const st = calcStats(pts);
      const ok = sd?.available !== false && pts.length>0;
      const name = sd?.name?.replace(/OP-\d+\s*/,'') ?? id;

        <div class="cmp-card${ok?'':' unavailable'}" onclick="${ok?`selectSet('${id}')`:''}" >

          ${st ? `
            <div class="cmp-price">${fmt(st.latest)}</div>

                ${up?'▲':'▼'} ${up?'+':''}${st.pct}%
              </span>
            </div>
            <canvas class="cmp-canvas" id="mc_${id}" width="185" height="44"></canvas>
          ` : '<div style="color:var(--text3);font-size:.82rem;margin-top:8px">N/A</div>'}
        </div>`;
    }).join('');

    main.innerHTML = `
      <div class="page-title"><h2>Alle Sets im Vergleich</h2></div>
      <div class="cmp-grid">${html}</div>`;

    SET_IDS.forEach(id => {
      const sd = allSets[id];
      const pts = getPoints(sd);
      if (pts.length < 2) return;
      const canvas = document.getElementById('mc_'+id);
      if (!canvas) return;

  /* ── DATA LOADING ── */
  const isLocal = ['localhost','127.0.0.1'].includes(location.hostname);

  let _scraperPollTimer = null;

  function cancelScraper() {
    fetch('/api/scrape/cancel').catch(() => {});
    _stopScraperUI();
  }

  function _stopScraperUI() {
    clearInterval(_scraperPollTimer);
    _scraperPollTimer = null;
    document.getElementById('scraperBar').classList.remove('visible');
  }

  async function refreshData() {
    document.getElementById('lastUpdate').textContent = 'Laden…';
    if (isLocal) {
      const bar = document.getElementById('scraperBar');
      document.getElementById('scraperFill').style.width = '3%';
      document.getElementById('scraperSub').textContent = 'Starte Scraper…';
      bar.classList.add('visible');

      try {
        const start = await fetch('/api/scrape/start');
        const sj = await start.json();
        if (!sj.ok) throw new Error(sj.error);
      } catch(e) {
        _stopScraperUI();
        await loadJSON();
        return;
      }

      _scraperPollTimer = setInterval(async () => {
        try {
          const r = await fetch('/api/scrape/status');
          const s = await r.json();
          document.getElementById('scraperFill').style.width = s.progress + '%';
          document.getElementById('scraperSub').textContent = s.current || 'Läuft…';
          if (s.done) {
            _stopScraperUI();
            if (s.error) { await loadJSON(); }
            else if (s.data) { applyData(s.data); }
            else { await loadJSON(); }
          }
        } catch { _stopScraperUI(); await loadJSON(); }
      }, 2000);
    } else {
      document.getElementById('main').innerHTML = `<div class="loading"><div class="spinner"></div><h3>Daten werden geladen</h3></div>`;
      await loadJSON();
    }
  }

  async function loadJSON() {
    try {
      const r = await fetch('prices_all.json?t='+Date.now());
      if (!r.ok) throw new Error('Datei nicht gefunden');
      applyData(await r.json());
    } catch(e) {
      document.getElementById('main').innerHTML = `<div class="empty-state" style="margin-top:60px">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="#FF3B30" stroke-width="2.5" stroke-dasharray="8 4"/><path d="M32 20v14M32 40v2" stroke="#FF3B30" stroke-width="3" stroke-linecap="round"/></svg>
        <h4>Fehler beim Laden</h4>
        <p>${e.message}</p>
      </div>`;
    }
  }

  function applyData(data) {
    allSets = data.sets || {};
    if (data.last_updated) {
      const d = new Date(data.last_updated);
      document.getElementById('lastUpdate').textContent = d.toLocaleDateString('de-DE') + ' ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    }
    buildSidebar(data);
    buildSparklines(data);
    if (!allSets[activeSet]?.available) {
      activeSet = SET_IDS.find(id => allSets[id]?.available && getPoints(allSets[id]).length>0) ?? 'op14';
    }
    compareMode ? renderCompare() : renderDetail(activeSet);
    document.querySelectorAll('.set-item').forEach(el => el.classList.toggle('active', el.dataset.id===activeSet));
  }

  /* ══ HOVER CARD PREVIEW ══ */
  const _chp = document.getElementById('cardHoverPreview');
  let _chpTimer = null;
  function showCardPreview(el, src, name, price) {
    clearTimeout(_chpTimer);
    document.getElementById('chpImg').src = src;
    document.getElementById('chpName').textContent = name;
    document.getElementById('chpPrice').textContent = price ? '$' + price.toFixed(2) : '';
    _chp.style.display = 'block';
    _positionPreview(el);
  }
  function _positionPreview(el) {
    const r = el.getBoundingClientRect();
    const pw = 156, ph = 200;
    let left = r.right + 10;
    let top = r.top - 20;
    if (left + pw > window.innerWidth - 10) left = r.left - pw - 10;
    if (top + ph > window.innerHeight - 10) top = window.innerHeight - ph - 10;
    _chp.style.left = left + 'px';
    _chp.style.top = Math.max(10, top) + 'px';
  }
  function hideCardPreview() {
    _chpTimer = setTimeout(() => { _chp.style.display = 'none'; }, 80);
  }

  /* ══ LIGHTBOX ══ */
  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
  }

  /* ══ GLOBAL CARD SEARCH ══ */
  function globalSearch(q) {
    const drop = document.getElementById('gsearchDrop');
    q = q.trim();
    if (q.length < 2) { drop.classList.remove('open'); return; }

    const ql = q.toLowerCase();
    const results = [];

    SET_IDS.forEach(id => {
      const sd = allSets[id];
      if (!sd?.cards) return;
      const opNum = 'OP-' + id.replace('op','').padStart(2,'0');
      sd.cards.forEach(c => {
        if (c.name.toLowerCase().includes(ql) || c.number.toLowerCase().includes(ql)) {
          results.push({ ...c, setId: id, setNum: opNum });
        }
      });
    });

    if (!results.length) {
      drop.innerHTML = `<div class="gsd-empty">Keine Karte gefunden für „${q}"</div>`;
      drop.classList.add('open');
      return;
    }

    // Nach Ungraded-Preis sortieren, max 12 anzeigen
    results.sort((a,b) => (b.price||0) - (a.price||0));
    const shown = results.slice(0, 12);
    const total = results.length;

    const highlight = str => str.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');

    drop.innerHTML = `
      <div class="gsd-header">${total} Treffer${total > 12 ? ` (Top 12)` : ''}</div>
      ${shown.map(c => `
        <div class="gsd-item" onclick="goToCard('${c.setId}','${c.url}')">
          ${c.img ? `<img src="${c.img}" style="width:26px;height:36px;object-fit:contain;border-radius:3px;border:1px solid var(--border);flex-shrink:0" loading="lazy">` : ''}
          <span class="gsd-set">${c.setNum}</span>
          <span class="gsd-name">${highlight(c.name)}</span>
          <div class="gsd-prices">
            ${c.price  != null ? `<span class="gsd-price ug">$${c.price.toFixed(2)}</span>` : ''}
            ${c.psa10  != null ? `<span class="gsd-price p10">PSA10 $${c.psa10.toFixed(2)}</span>` : ''}
          </div>
        </div>`).join('')}`;
    drop.classList.add('open');
  }

  function goToCard(setId, url) {
    // Dropdown schließen
    document.getElementById('gsearchDrop').classList.remove('open');
    document.getElementById('gsearch').value = '';
    // Set öffnen + PriceCharting-Link in neuem Tab
    selectSet(setId);
    window.open(url, '_blank');
  }

  // Dropdown schließen bei Klick außerhalb
  document.addEventListener('click', e => {
    if (!document.getElementById('gsearchWrap').contains(e.target)) {
      document.getElementById('gsearchDrop').classList.remove('open');
    }
  });

  /* ══ INVENTORY ══ */
  let inventory = JSON.parse(localStorage.getItem('op_inventory') || '{}');
  let invOpen = false;

  function invKey(setId, card, grade) {
    return setId + '__' + (card.number || card.name.replace(/\s+/g,'_').slice(0,30)) + '__' + (grade || 'ungraded');
  }

  function displayKey(id) {
    return id + '__display__display';
  }

  function isDisplayInInv(id) {
    return !!inventory[displayKey(id)];
  }

  function addDisplayToInventory(id) {
    const sd  = allSets[id];
    const pts = getPoints(sd);
    const st  = calcStats(pts);
    const k   = displayKey(id);
    const opNum = 'OP-' + id.replace('op','').padStart(2,'0');
    if (inventory[k]) {
      inventory[k].qty += 1;
    } else {
      inventory[k] = {
        name: (sd?.name || id.toUpperCase()) + ' Display',
        number: '', grade: 'display', type: 'display',
        price: st ? st.latest / 100 : null,
        img: sd?.box_img || null,
        url: sd?.url || null,
        setId: id, opNum, qty: 1, addedAt: Date.now()
      };
    }
    saveInventory();
    updateInvButton();
    renderInventoryList();
    const btn = document.getElementById('dispbtn_' + id);
    if (btn) { btn.classList.add('in-inv'); btn.innerHTML = '📦 Display ✓'; }
  }

  // Grade picker popup
  let _gradePickerEl = null;
  function closeGradePicker() {
    if (_gradePickerEl) { _gradePickerEl.remove(); _gradePickerEl = null; }
    document.removeEventListener('click', _closeGradePickerOutside, true);
  }
  function _closeGradePickerOutside(e) {
    if (_gradePickerEl && !_gradePickerEl.contains(e.target)) closeGradePicker();
  }

  function showGradePicker(event, card, setId) {
    event.stopPropagation();
    closeGradePicker();
    const btn = event.currentTarget;
    const rect = btn.getBoundingClientRect();

    const picker = document.createElement('div');
    picker.className = 'grade-picker';
    picker.innerHTML = `
      <div class="grade-picker-label">Zustand wählen</div>
      <button class="grade-opt" data-grade="ungraded">
        Ungraded <span class="grade-price">${card.price != null ? '$'+card.price.toFixed(2) : '–'}</span>
      </button>
      <button class="grade-opt" data-grade="psa9">
        PSA 9 <span class="grade-price">${card.grade9 != null ? '$'+card.grade9.toFixed(2) : '–'}</span>
      </button>
      <button class="grade-opt" data-grade="psa10">
        PSA 10 <span class="grade-price">${card.psa10 != null ? '$'+card.psa10.toFixed(2) : '–'}</span>
      </button>`;

    // Position near button
    picker.style.top  = (rect.bottom + window.scrollY + 4) + 'px';
    picker.style.left = (rect.left + window.scrollX - 60) + 'px';
    document.body.appendChild(picker);
    _gradePickerEl = picker;

    picker.querySelectorAll('.grade-opt').forEach(optBtn => {
      optBtn.addEventListener('click', e => {
        e.stopPropagation();
        addToInventory(card, setId, optBtn.dataset.grade);
        closeGradePicker();
      });
    });

    setTimeout(() => document.addEventListener('click', _closeGradePickerOutside, true), 0);
  }

  function saveInventory() {
    localStorage.setItem('op_inventory', JSON.stringify(inventory));
  }

  function updateInvButton() {
    const total = Object.values(inventory).reduce((s, v) => s + v.qty, 0);
    const badge = document.getElementById('invCountBadge');
    const btn = document.getElementById('invBtn');
    if (total > 0) {
      badge.textContent = total;
      badge.style.display = '';
      btn.classList.add('has-items');
    } else {
      badge.style.display = 'none';
      btn.classList.remove('has-items');
    }
  }

  function addToInventory(card, setId, grade) {
    grade = grade || 'ungraded';
    const k = invKey(setId, card, grade);
    // Determine the price for this grade
    let gradePrice = card.price;
    if (grade === 'psa9')  gradePrice = card.grade9 ?? card.price;
    if (grade === 'psa10') gradePrice = card.psa10  ?? card.price;
    if (inventory[k]) {
      inventory[k].qty += 1;
    } else {
      const opNum = 'OP-' + setId.replace('op','').padStart(2,'0');
      inventory[k] = { ...card, setId, opNum, grade, price: gradePrice, qty: 1, addedAt: Date.now() };
    }
    saveInventory();
    updateInvButton();
    renderInventoryList();
    // Visual feedback on + button (base key, no grade suffix)
    const baseKey = setId + '__' + (card.number || card.name.replace(/\s+/g,'_').slice(0,30));
    const addBtnEl = document.getElementById('addbtn_' + baseKey);
    if (addBtnEl) addBtnEl.classList.add('in-inv');
  }

  function changeQty(k, delta) {
    if (!inventory[k]) return;
    inventory[k].qty += delta;
    if (inventory[k].qty <= 0) {
      delete inventory[k];
      // Remove in-inv class if no grades left for this card
      const parts = k.split('__');
      if (parts[2] === 'display') {
        const btn = document.getElementById('dispbtn_' + parts[0]);
        if (btn) { btn.classList.remove('in-inv'); btn.innerHTML = '📦 Display +'; }
      } else {
        const baseKey = parts.slice(0,2).join('__');
        const anyLeft = ['ungraded','psa9','psa10'].some(g => inventory[baseKey + '__' + g]);
        if (!anyLeft) {
          const btn = document.getElementById('addbtn_' + baseKey);
          if (btn) btn.classList.remove('in-inv');
        }
      }
    }
    saveInventory();
    updateInvButton();
    renderInventoryList();
  }

  function clearInventory() {
    if (!Object.keys(inventory).length) return;
    if (!confirm('Inventar wirklich leeren?')) return;
    inventory = {};
    saveInventory();
    updateInvButton();
    renderInventoryList();
    document.querySelectorAll('.add-inv-btn').forEach(b => b.classList.remove('in-inv'));
  }

  // Portfolio value history — [[timestamp_ms, totalValue], ...]
  let portfolioHistory = JSON.parse(localStorage.getItem('op_portfolio_history') || '[]');

  function savePortfolioSnapshot(total) {
    if (total <= 0) return;
    const now = Date.now();
    const ONE_HOUR = 3600 * 1000;
    // Only save once per hour max
    const last = portfolioHistory[portfolioHistory.length - 1];
    if (last && now - last[0] < ONE_HOUR) {
      // Update last snapshot with current value
      portfolioHistory[portfolioHistory.length - 1] = [last[0], total];
    } else {
      portfolioHistory.push([now, total]);
    }
    // Keep max 365 entries
    if (portfolioHistory.length > 365) portfolioHistory = portfolioHistory.slice(-365);
    localStorage.setItem('op_portfolio_history', JSON.stringify(portfolioHistory));
  }

  let invHistoryChart = null;

  function renderHistoryChart(total) {
    const wrap  = document.getElementById('invHistoryWrap');
    const delta = document.getElementById('invHistoryDelta');
    if (!wrap) return;

    if (portfolioHistory.length < 2) {
      wrap.style.display = 'none';
      if (invHistoryChart) { invHistoryChart.destroy(); invHistoryChart = null; }
      return;
    }

    wrap.style.display = '';
    const first = portfolioHistory[0][1];
    const diff  = total - first;
    const pct   = ((diff / first) * 100).toFixed(1);
    delta.textContent = `${diff >= 0 ? '+' : ''}$${diff.toFixed(2)} (${diff >= 0 ? '+' : ''}${pct}%)`;
    delta.className = 'inv-history-delta ' + (diff > 0 ? 'pos' : diff < 0 ? 'neg' : 'neu');

    const canvas = document.getElementById('invHistoryChart');
    if (invHistoryChart) invHistoryChart.destroy();

    const up = diff >= 0;
    const color = up ? '#34C759' : '#FF3B30';
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 90);
    grad.addColorStop(0, up ? 'rgba(52,199,89,.15)' : 'rgba(255,59,48,.12)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');

    invHistoryChart = new Chart(canvas, {
      type: 'line',
      data: {
        labels: portfolioHistory.map(p => new Date(p[0])),
        datasets: [{
          data: portfolioHistory.map(p => p[1]),
          borderColor: color, backgroundColor: grad,
          borderWidth: 2, pointRadius: portfolioHistory.length < 8 ? 3 : 0,
          pointBackgroundColor: color, tension: .35, fill: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(255,255,255,.97)', borderColor: 'rgba(0,0,0,.08)', borderWidth: 1,
            titleColor: '#AEAEB2', bodyColor: '#1C1C1E', padding: 8,
            callbacks: {
              title: i => new Date(i[0].parsed.x).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'}),
              label: i => ` $${i.parsed.y.toFixed(2)}`
            }
          }
        },
        scales: {
          x: { type: 'time', time: { unit: portfolioHistory.length > 60 ? 'month' : 'week', displayFormats: { week: 'dd.MM', month: 'MMM yy' } },
               grid: { display: false }, ticks: { color: '#AEAEB2', maxTicksLimit: 5, font: { size: 9 } } },
          y: { grid: { color: 'rgba(0,0,0,.04)' },
               ticks: { color: '#AEAEB2', font: { size: 9 }, callback: v => '$' + v.toFixed(0) } }
        }
      }
    });
  }

  let invPieChart = null;

  function renderInventoryList() {
    const list      = document.getElementById('invList');
    const totalEl   = document.getElementById('invTotalVal');
    const countEl   = document.getElementById('invCardCount');
    const chartWrap = document.getElementById('invChartWrap');
    if (!list) return;

    const items = Object.entries(inventory);
    if (!items.length) {
      list.innerHTML = `<div class="empty-state">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none"><rect x="8" y="6" width="36" height="42" rx="6" stroke="#AEAEB2" stroke-width="2.5"/><path d="M16 18h20M16 26h14M16 34h8" stroke="#AEAEB2" stroke-width="2" stroke-linecap="round"/><circle cx="38" cy="38" r="10" fill="#F2F2F7" stroke="#AEAEB2" stroke-width="2"/><path d="M34 38h8M38 34v8" stroke="#AEAEB2" stroke-width="2" stroke-linecap="round"/></svg>
        <h4>Inventar leer</h4>
        <p>Klicke auf <b>+</b> neben einer Karte, um sie hinzuzufügen.</p>
      </div>`;
      if (totalEl)   totalEl.textContent  = '$0.00';
      if (countEl)   countEl.textContent  = '0';
      if (chartWrap) chartWrap.style.display = 'none';
      if (invPieChart) { invPieChart.destroy(); invPieChart = null; }
      const hw = document.getElementById('invHistoryWrap');
      if (hw) hw.style.display = 'none';
      if (invHistoryChart) { invHistoryChart.destroy(); invHistoryChart = null; }
      const exportRow = document.getElementById('invExportRow');
      if (exportRow) exportRow.style.display = 'none';
      return;
    }

    // Compute values
    let total = 0, totalQty = 0;
    const chartLabels = [], chartValues = [], chartColors = [];
    const palette = ['#007AFF','#34C759','#FF9500','#AF52DE','#FF3B30','#5856D6','#00C7BE','#FF2D55','#32ADE6','#FFD60A'];

    items.forEach(([k, c], i) => {
      const val = (c.price || 0) * c.qty;
      total    += val;
      totalQty += c.qty;
      const gradeLbl = c.grade === 'psa9' ? 'PSA 9' : c.grade === 'psa10' ? 'PSA 10' : '';
      chartLabels.push(c.name.replace(/OP-\d+\s*/,'').slice(0,18) + (gradeLbl ? ' · '+gradeLbl : ''));
      chartValues.push(parseFloat(val.toFixed(2)));
      chartColors.push(palette[i % palette.length]);
    });

    if (totalEl) totalEl.textContent = '$' + total.toFixed(2);
    if (countEl) countEl.textContent = totalQty;

    // Portfolio history snapshot + chart
    savePortfolioSnapshot(total);
    renderHistoryChart(total);

    // Pie chart
    if (chartWrap) chartWrap.style.display = '';
    const canvas = document.getElementById('invPieChart');
    if (invPieChart) invPieChart.destroy();
    invPieChart = new Chart(canvas, {
      type: 'doughnut',
      data: { labels: chartLabels, datasets: [{ data: chartValues, backgroundColor: chartColors, borderWidth: 2, borderColor: '#FFFFFF' }] },
      options: {
        cutout: '60%',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` ${ctx.label}: $${ctx.parsed.toFixed(2)}` } }
        },
        animation: { duration: 300 }
      }
    });

    // Show export row
    const exportRow = document.getElementById('invExportRow');
    if (exportRow) exportRow.style.display = '';

    // Card list with Kaufpreis + P&L
    list.innerHTML = items.map(([k, c], i) => {
      const lineVal = (c.price || 0) * c.qty;
      const gradeLbl = c.grade === 'psa9' ? 'PSA 9' : c.grade === 'psa10' ? 'PSA 10' : c.grade === 'display' ? 'Display' : 'Ungraded';
      const dot = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${chartColors[i]};flex-shrink:0"></span>`;
      const buyTotal = c.buyPrice != null ? c.buyPrice * c.qty : null;
      const pnl = buyTotal != null && c.price != null ? lineVal - buyTotal : null;
      const pnlHtml = pnl != null
        ? `<span class="inv-pnl ${pnl>0?'pos':pnl<0?'neg':'neu'}">${pnl>=0?'+':''}$${pnl.toFixed(2)}</span>`
        : '';
      return `
        <div class="inv-item">
          ${c.img
            ? `<img class="inv-item-img" src="${c.img}" loading="lazy">`
            : `<div class="inv-item-img-placeholder"></div>`}
          <div class="inv-item-info">
            <div class="inv-item-name" title="${c.name}">${c.name}</div>
            <div class="inv-item-meta">${dot}<span>${c.opNum}${c.number ? ' · '+c.number : ''}</span>
              <span class="inv-grade-badge ${c.grade||'ungraded'}">${gradeLbl}</span>
            </div>
            ${c.addedAt ? `<div class="inv-item-date">seit ${new Date(c.addedAt).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}</div>` : ''}
          </div>
          <div class="inv-qty">
            <button class="qty-btn" onclick="changeQty('${k}',-1)">−</button>
            <span class="qty-num">${c.qty}</span>
            <button class="qty-btn" onclick="changeQty('${k}',1)">+</button>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">
            <span class="inv-item-price">${c.price != null ? '$'+lineVal.toFixed(2) : '–'}</span>
            <input class="inv-buy-price" type="number" min="0" step="0.01" placeholder="Kaufpr." title="Kaufpreis pro Stück"
              value="${c.buyPrice != null ? c.buyPrice.toFixed(2) : ''}"
              onchange="setBuyPrice('${k}', this.value)" onclick="event.stopPropagation()">
            ${pnlHtml}
          </div>
        </div>`;
    }).join('');
  }

  function setBuyPrice(k, val) {
    if (!inventory[k]) return;
    const v = parseFloat(val);
    inventory[k].buyPrice = isNaN(v) || v < 0 ? null : v;
    saveInventory();
    renderInventoryList();
  }

  function exportInventory(format) {
    const items = Object.values(inventory);
    if (!items.length) return;
    let content, mime, ext;
    if (format === 'json') {
      content = JSON.stringify(items, null, 2);
      mime = 'application/json'; ext = 'json';
    } else {
      const headers = ['Name','Set','Nummer','Grade','Qty','Kaufpreis','Aktuell','P&L','Hinzugefügt'];
      const rows = items.map(c => {
        const lineVal = (c.price || 0) * c.qty;
        const buyTotal = c.buyPrice != null ? c.buyPrice * c.qty : '';
        const pnl = c.buyPrice != null && c.price != null ? (lineVal - c.buyPrice * c.qty).toFixed(2) : '';
        return [
          `"${c.name}"`, c.opNum, c.number||'',
          c.grade === 'psa9' ? 'PSA 9' : c.grade === 'psa10' ? 'PSA 10' : 'Ungraded',
          c.qty, c.buyPrice != null ? c.buyPrice.toFixed(2) : '',
          c.price != null ? lineVal.toFixed(2) : '',
          pnl,
          c.addedAt ? new Date(c.addedAt).toLocaleDateString('de-DE') : ''
        ].join(',');
      });
      content = [headers.join(','), ...rows].join('\n');
      mime = 'text/csv'; ext = 'csv';
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: mime }));
    a.download = `inventar_${new Date().toISOString().slice(0,10)}.${ext}`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function toggleInventory() {
    invOpen = !invOpen;
    document.getElementById('invDrawer').classList.toggle('open', invOpen);
    if (invOpen) renderInventoryList();
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const isOpen = sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('open', isOpen);
  }

  // Close sidebar when a set is selected (mobile)
  function closeSidebarOnMobile() {
    if (window.innerWidth <= 768) {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.remove('mobile-open');
      overlay.classList.remove('open');
    }
  }

  // Init inventory button state on load
  updateInvButton();

  refreshData();
</script>
</body>
</html>
